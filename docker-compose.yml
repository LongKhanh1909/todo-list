services:
  # --- Backend Service (Spring Boot) ---
  todo-backend:
    build: ./backend  # Path to your backend folder with the Dockerfile
    container_name: todo-api
    env_file: 
      - ./backend/.env
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    environment:
      - SERVER_PORT=${SERVER_PORT}
    networks:
      - todo-network

  # --- Frontend Service (React + Nginx) ---
  todo-frontend:
    build: ./frontend # Path to your frontend folder with the Dockerfile
    container_name: todo-ui
    ports:
      - "3000:80"     # Map local port 3000 to Nginx port 80
    depends_on:
      - todo-backend  # Don't start FE until BE is ready
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge